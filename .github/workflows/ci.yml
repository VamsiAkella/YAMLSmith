
name: YAMLSmith CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
        
        # with is not must, optional but we use so just if the required python version is not provided.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
          # we can also use "pip install -r requirements.txt" but above one handles failure quietly without error.
          # ex: there might be scenario where there is no "requirements.txt", and as this is pre-written it will throw error.
          
      - name: Validate Flask app syntax
        run: |
          python -m py_compile app.py

        # converts python code to byte code without importing or executing.

      - name: Verify template files exist
        run: |
          test -f templates/index.html
        
        # test is just a boolean checker - to check if the "index.html" file exist or not under templates.
        # 0 = True; 1 = False; >1 error (bad arguments, etc)

